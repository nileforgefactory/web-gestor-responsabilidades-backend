# Compose de producción para Coolify — fusiona docker-compose.yml + docker-compose.prod.yml
# en un solo archivo (Coolify solo admite un compose por recurso).
#
# Variables sensibles: configúralas en Coolify → Environment Variables, NO las dejes
# hardcodeadas aquí. Los valores tras ":-" son solo defaults de referencia.
#
# Migraciones MySQL: aplicar manualmente tras el primer deploy:
#   docker exec -it <container_api> alembic upgrade head
name: gestor-backend

networks:
  default:
    name: gestor-backend-net

services:

  redis:
    image: redis:7-alpine
    container_name: gestor-backend-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: gestor-backend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD requerido}
      MYSQL_DATABASE: gestor_responsabilidades
      MYSQL_USER: gestor
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD requerido}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: gestor-backend-ollama
    volumes:
      - ollama_data:/root/.ollama
    expose:
      - "11434"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 40
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: gestor-backend-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama-pull:
    build:
      context: .
      dockerfile: Dockerfile.ollama-pull
    image: gestor-backend-ollama-pull:local
    container_name: gestor-backend-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      EMBED_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      BOOTSTRAP_MAX_WAIT_SEC: "600"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: gestor-backend-api:local
    container_name: gestor-backend-api
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: rag_chunks
      VECTOR_SIZE: "768"
      USE_OLLAMA: "true"
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-llama3.1:8b}
      # OpenAI — máxima prioridad; cobro por uso sin prepago
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      # OpenRouter — prioridad sobre Gemini; embeddings siguen usando Ollama
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-google/gemini-3.5-flash}
      # Gemini — solo se usa si OPENROUTER_API_KEY está vacío
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-2.0-flash}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-gemini-embedding-001}
      INGEST_EMBED_CONCURRENCY: "4"
      RAG_DEFAULT_SCORE_THRESHOLD: "0.25"
      MYSQL_URL: mysql+aiomysql://gestor:${MYSQL_PASSWORD:?MYSQL_PASSWORD requerido}@mysql:3306/gestor_responsabilidades?charset=utf8mb4
      MYSQL_POOL_PRE_PING: "false"
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      OLLAMA_LOG_LLM_BODIES: ${OLLAMA_LOG_LLM_BODIES:-false}
      SCRAPER_MAX_CONCURRENCY: ${SCRAPER_MAX_CONCURRENCY:-3}
      SCRAPER_DEFAULT_PAIS: ${SCRAPER_DEFAULT_PAIS:-COLOMBIA}
      REDIS_URL: redis://redis:6379/0
      OCR_ENABLED: "true"
      OCR_LANG: spa
      OCR_DPI: "200"
      OCR_MIN_CHARS_PER_PAGE: "50"
      OCR_BATCH_PAGES: ${OCR_BATCH_PAGES:-4}
      BULK_MAX_FILES: "50"
      BULK_MAX_FILE_BYTES: "52428800"
      BULK_INGEST_CONCURRENCY: "2"
      DEFAULT_CHUNK_STRATEGY: "adaptive"
      ANALYSIS_MAX_ITERATIONS: "3"
      ANALYSIS_PLAN_TOP_K: ${ANALYSIS_PLAN_TOP_K:-20}
      ANALYSIS_NORMATIVA_TOP_K: ${ANALYSIS_NORMATIVA_TOP_K:-8}
      ANALYSIS_PLAN_BLOB_CHARS: ${ANALYSIS_PLAN_BLOB_CHARS:-16000}
      ANALYSIS_NORMATIVA_BLOB_CHARS: ${ANALYSIS_NORMATIVA_BLOB_CHARS:-4000}
      ANALYSIS_MATRIZ_MODE: ${ANALYSIS_MATRIZ_MODE:-deterministic}
      ANALYSIS_SCRAPE_MISSING_LAWS: ${ANALYSIS_SCRAPE_MISSING_LAWS:-true}
      ANALYSIS_SCRAPE_MAX_LAWS: ${ANALYSIS_SCRAPE_MAX_LAWS:-5}
      BACKGROUND_SCRAPER_DURATION_MIN: ${BACKGROUND_SCRAPER_DURATION_MIN:-30}
      BACKGROUND_SCRAPER_AUTO_START: ${BACKGROUND_SCRAPER_AUTO_START:-false}
      BACKGROUND_SCRAPER_CONCURRENCY: ${BACKGROUND_SCRAPER_CONCURRENCY:-2}
      # JWT — obligatorio en producción; generar con: openssl rand -hex 32
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY requerido}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      # Superadmin creado por migración Alembic (tabla roles + usuarios)
      AUTH_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_BOOTSTRAP_ADMIN_EMAIL:?AUTH_BOOTSTRAP_ADMIN_EMAIL requerido}
      AUTH_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_BOOTSTRAP_ADMIN_PASSWORD:?AUTH_BOOTSTRAP_ADMIN_PASSWORD requerido}
      AUTH_BOOTSTRAP_ADMIN_NOMBRE: ${AUTH_BOOTSTRAP_ADMIN_NOMBRE:-Super Administrador}
      AUTH_BOOTSTRAP_ADMIN_TERRITORIO: ${AUTH_BOOTSTRAP_ADMIN_TERRITORIO:-["COLOMBIA", null, null]}
    ports:
      - "8000:8000"
    volumes:
      - ./sample_documents:/samples:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/health/ready"]
      interval: 20s
      timeout: 15s
      retries: 8
      start_period: 120s

volumes:
  qdrant_data:
  ollama_data:
  mysql_data:
  redis_data:
